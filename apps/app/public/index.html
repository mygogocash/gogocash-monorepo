    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }

      body {
        overflow: hidden;
        font-family: "DM Sans", Anuphan, system-ui, sans-serif;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* Image download deterrent (founder request 2026-07-22): block drag-to-save and the
         long-press callout on every image app-wide. This is a DETERRENT only — screenshots
         and the network tab still expose the raw asset; real protection needs CDN hotlink
         protection / signed URLs on media.gogocash.co. */
      img,
      [data-expoimage],
      [data-expoimage] * {
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- Capture LIFF/OAuth return params before the Expo SPA can strip them,
         and bounce Endpoint-URL returns onto /auth/line-callback. -->
    <script>
      (function () {
        try {
          var href = location.href;
          if (
            !/[?&#](code|state|liffClientId|liffRedirectUri|liffState|error)=/.test(
              href
            )
          ) {
            return;
          }
          sessionStorage.setItem("gogocash.line.auth.returnHref.v1", href);
          var path = location.pathname.replace(/\/+$/, "") || "/";
          if (path === "/auth/line-callback") {
            return;
          }
          var next = new URL("/auth/line-callback", location.origin);
          var current = new URL(href);
          current.searchParams.forEach(function (value, key) {
            next.searchParams.set(key, value);
          });
          next.hash = current.hash;
          if (!next.searchParams.get("callbackUrl")) {
            next.searchParams.set("callbackUrl", "/profile");
          }
          location.replace(next.pathname + next.search + next.hash);
        } catch (e) {}
      })();
    </script>
    <!-- Image download deterrent: swallow right-click "Save image" + drag-to-save on every
         image app-wide (pairs with the img CSS above). Deterrent only, not real protection. -->
    <script>
      (function () {
        function isImage(target) {
          return (
            target &&
            (target.tagName === "IMG" ||
              (typeof target.closest === "function" &&
                target.closest("[data-expoimage]")))
          );
        }
        document.addEventListener(
          "contextmenu",
          function (e) {
            if (isImage(e.target)) e.preventDefault();
          },
          true
        );
        document.addEventListener(
          "dragstart",
          function (e) {
            if (isImage(e.target)) e.preventDefault();
          },
          true
        );
      })();
    </script>
    <div id="root"></div>
  </body>
