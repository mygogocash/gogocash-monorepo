# Wallet flow requires an authenticated session — run against staging with a test account
# or local stack after manual login. Document-only until JWT injection is scripted.
# Asserts the wallet-dashboard testID (authenticated-only) and the absence of the login
# screen, so an unauthenticated run fails instead of false-passing on "Wallet" text.
appId: co.gogocash.app
---
- launchApp
- openLink: gogocash://wallet
- assertVisible:
    id: "wallet-dashboard"
- assertNotVisible:
    id: "login-screen"
