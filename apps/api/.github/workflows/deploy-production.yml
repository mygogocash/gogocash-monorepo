# Deploy Backend API to Cloud Run — api.gogocash.co
# Scaffold — awaits infra setup before first successful run.
#
# ─── TODO — production infrastructure setup ───────────────────────────
#   1. Create dedicated GCP project gogocash-production (strongly
#      recommended for prod isolation — separate IAM, Secret Manager,
#      billing, logs). Alternatively reuse gogocash-staging with
#      service suffix only.
#   2. Repo variables:
#        GCP_PROJECT_ID_PRODUCTION       e.g. gogocash-production
#        GCP_WIF_PROVIDER_PRODUCTION     projects/<id>/locations/global/...
#        GCP_SERVICE_ACCOUNT_PRODUCTION  github-actions-api@…
#   3. First deploy provisions Cloud Run service gogocash-api-production.
#      Afterwards: Cloud Run Console → Custom domains → api.gogocash.co.
#   4. Create production Secret Manager entries:
#        gogocash-production-mongo-uri, gogocash-production-jwt-secret,
#        gogocash-production-jwt-admin-secret, etc.
#        (mirror staging secret shapes).
#   5. Enable branch protection on `production`:
#        required: PR, 1 review, status checks passing.
# ──────────────────────────────────────────────────────────────────────

name: Deploy API (production)

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: api-production-${{ github.ref }}
  cancel-in-progress: false # never cancel a production deploy mid-flight

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm run test

      - name: Build (type-check)
        # nest build (tsc) exceeds Node's 2GB default heap on runners (exit 134)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

  deploy:
    name: Docker → Artifact Registry → Cloud Run
    needs: test
    runs-on: ubuntu-latest
    env:
      REGION: asia-southeast1
      SERVICE_NAME: gogocash-api-production
      ARTIFACT_REPO: gogocash

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_PRODUCTION }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PRODUCTION }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            --cache-from ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 1 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "NODE_ENV=production,WEB_APP_URL=https://app.gogocash.co,API_BASE_URL=https://api.gogocash.co,POSTHOG_HOST=https://us.i.posthog.com,POSTHOG_ENABLED=true,GCS_CATALOG_BUCKET=gogocash-catalog-production" \
            --set-secrets "MONGO_URI=gogocash-production-mongo-uri:latest,JWT_SECRET=gogocash-production-jwt-secret:latest,JWT_ADMIN_SECRET=gogocash-production-jwt-admin-secret:latest,FIREBASE_PROJECT_ID=gogocash-production-firebase-project-id:latest,INVOLVE_SECRET=gogocash-production-involve-secret:latest,INVOLVE_POSTBACK_SECRET=gogocash-production-involve-postback-secret:latest,POSTHOG_KEY=gogocash-production-posthog-key:latest,TELEGRAM_BOT_TOKEN=gogocash-production-telegram-bot-token:latest,CROSSMINT_AUTH_BASE=gogocash-production-crossmint-auth-base:latest,CROSSMINT_PROJECT_ID=gogocash-production-crossmint-project-id:latest,CROSSMINT_SECRET=gogocash-production-crossmint-secret:latest" \
            --project ${{ vars.GCP_PROJECT_ID_PRODUCTION }}

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID_PRODUCTION }} \
            --format "value(status.url)"
