# Deploy Customer App to Firebase App Hosting — app.gogocash.co
# Scaffold — awaits infra setup before first successful run.
#
# ─── TODO — production infrastructure setup ───────────────────────────
#   1. Create Firebase App Hosting backend "gogocash-web-production" in
#      a dedicated gogocash-app-production project (recommended — keep
#      prod isolated from staging for blast radius + IAM).
#   2. Bind custom domain app.gogocash.co to the backend.
#   3. Set production NEXTAUTH_SECRET in Secret Manager on the prod project.
#   4. Repo variables (or vars.*_PRODUCTION flavours):
#        FIREBASE_WIF_PROVIDER_PRODUCTION
#        FIREBASE_SA_EMAIL_PRODUCTION
#        FIREBASE_PROJECT_PRODUCTION     (e.g. gogocash-app-production)
#   5. Enable branch protection on `production`:
#        required: PR, 1 review, status checks passing.
# ──────────────────────────────────────────────────────────────────────

name: Deploy Customer App (production)

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: app-production-${{ github.ref }}
  cancel-in-progress: false # never cancel a production deploy mid-flight

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        env:
          SKIP_ENV_VALIDATION: "1"
        run: npm run lint && npm run format:check && npm run i18n:check

      - name: Unit tests
        env:
          SKIP_ENV_VALIDATION: "1"
          NODE_ENV: test
        run: npm run test

      - name: Build (production env)
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-min-32-chars!!"
          NEXT_PUBLIC_API_BASE_URL: https://api.gogocash.co
          NEXT_PUBLIC_MOCK_API: "0"
          NEXTAUTH_URL: https://app.gogocash.co
        run: npm run build

      - name: Bundle size budget
        run: npm run perf:check-budget

  deploy:
    name: Firebase App Hosting deploy
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.FIREBASE_WIF_PROVIDER_PRODUCTION }}
          service_account: ${{ vars.FIREBASE_SA_EMAIL_PRODUCTION }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Firebase App Hosting
        run: |
          npx firebase-tools deploy --only apphosting \
            --project ${{ vars.FIREBASE_PROJECT_PRODUCTION }} \
            --non-interactive \
            --force \
            --token "${{ steps.auth.outputs.access_token }}"
