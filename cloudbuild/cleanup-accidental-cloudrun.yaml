steps:
  - id: delete-accidental-source-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        if gcloud run services describe "${_SERVICE}" \
          --project "$PROJECT_ID" \
          --region "${_REGION}" \
          >/dev/null 2>&1; then
          gcloud run services delete "${_SERVICE}" \
            --project "$PROJECT_ID" \
            --region "${_REGION}" \
            --quiet
        else
          echo "Cloud Run service ${_SERVICE} not found in ${_REGION}; nothing to delete."
        fi

substitutions:
  _REGION: europe-west1
  _SERVICE: gogocash-monorepo

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 300s
