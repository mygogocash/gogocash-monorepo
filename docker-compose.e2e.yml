# Local full-stack E2E MongoDB — single-node replica set (required for withdraw transactions).
# Usage: npm run e2e:up
services:
  mongo-e2e:
    image: mongo:8.0.4
    container_name: gogocash-mongo-e2e
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - gogocash-mongo-e2e-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  gogocash-mongo-e2e-data:
