# Dependabot — keeps dependencies patched continuously, CI-gated, with low PR
# noise via grouping. Targets `dev` (default integration branch).
version: 2
updates:
  # ── npm (single root lockfile covers all workspaces) ──────────────────────
  - package-ecosystem: npm
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # One PR for all safe minor/patch bumps — keeps noise down, easy to merge.
      npm-minor-patch:
        update-types:
          - minor
          - patch
      # Majors grouped separately so each breaking bump gets a deliberate review.
      npm-major:
        update-types:
          - major
    ignore:
      # These majors are pinned on purpose (modernized stack / framework lock);
      # let humans drive them, not weekly PRs.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase-admin"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions (also addresses #50) ───────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
