# Deploy Customer Web (Expo Web export) to Cloud Run — app-staging.gogocash.co
# (STAGING ONLY).
#
# Pipeline: run `expo export --platform web` in apps/app to produce the static
# `dist/`, build a tiny nginx static-serving image (apps/app/Dockerfile.web),
# push to Artifact Registry, and deploy to Cloud Run `gogocash-app-web-staging`.
# This is the Expo Web bundle that replaces the retired Next.js customer web.
#
# TRIGGER: workflow_dispatch ONLY. There is NO `on: push`.
#
# ─────────────────────────────────────────────────────────────────────────────
# MANUAL POST-DEPLOY STEP — CUSTOMER WEB DOMAIN CUTOVER (NOT automated here):
#   This workflow does NOT touch DNS. After verifying the new Cloud Run revision
#   serves the Expo Web export (login + wallet + one core screen, no chunk
#   404s), an operator must cut the customer web domain over manually:
#     1. Cloud Run → gogocash-app-web-staging → Custom domains →
#        app-staging.gogocash.co  (then add the CNAME Cloud Run returns to DNS).
#     2. Only once staging is verified should the production customer web domain
#        be repointed (Phase 5 / P5-4 — gated, separate explicit approval).
#   DNS is intentionally left manual: it's an R1 change with a human in the loop.
# ─────────────────────────────────────────────────────────────────────────────
#
# ─── Required GitHub variables (Settings → Secrets and variables → Actions → Variables) ───
#   GCP_PROJECT_ID        gogocash-staging
#   GCP_WIF_PROVIDER      projects/729804769570/locations/global/workloadIdentityPools/github-actions/providers/github
#   GCP_SERVICE_ACCOUNT   github-actions-api@gogocash-staging.iam.gserviceaccount.com
#   EXPO_PUBLIC_LIFF_ID    LINE Developing LIFF ID (public client identifier)
#
# ─── No Secret Manager secrets ───
#   The web export is a static bundle. EXPO_PUBLIC_* values are baked at export
#   time below. Firebase client keys are public; store them as GitHub Actions
#   secrets on the `staging` environment:
#     EXPO_PUBLIC_FIREBASE_API_KEY
#     EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
#     EXPO_PUBLIC_FIREBASE_PROJECT_ID
#     EXPO_PUBLIC_FIREBASE_APP_ID

name: Deploy App Web (staging)

on:
  workflow_dispatch:

concurrency:
  group: app-web-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Expo Web export → Docker → Artifact Registry → Cloud Run
    runs-on: ubuntu-latest
    environment: staging
    env:
      REGION: asia-southeast1
      SERVICE_NAME: gogocash-app-web-staging
      ARTIFACT_REPO: gogocash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - name: Use repository npm version
        run: npm install --global npm@10.9.8

      - name: Install (root, workspace-aware)
        run: npm ci

      - name: Expo Web export (static dist)
        # Produces apps/app/dist with index.html + _expo/static + assets.
        # EXPO_PUBLIC_* are inlined into the bundle at export time.
        env:
          EXPO_PUBLIC_API_URL: https://api-staging.gogocash.co
          EXPO_PUBLIC_APP_ENV: staging
          EXPO_PUBLIC_ACCOUNT_DATA_SOURCE: backend
          EXPO_PUBLIC_FRONTEND_URL: https://app-staging.gogocash.co
          EXPO_PUBLIC_LIFF_ID: ${{ vars.EXPO_PUBLIC_LIFF_ID }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: npm run export:web -w @gogocash/mobile

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build static-serving image
        # Build context = apps/app (the exported dist/ lives there).
        run: |
          docker build \
            -f apps/app/Dockerfile.web \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            apps/app

      - name: Push image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 256Mi \
            --cpu 1 \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)"
