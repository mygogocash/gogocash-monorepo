# Staging CD — BUILD half (GCP rollback / cutover ONLY).
#
# Day-to-day staging deploys via **Railway** on push to `staging` (see
# ci-staging.yml for the CI gate). This workflow builds Artifact Registry
# images for manual Cloud Run release — operator-initiated only.
#
# Gating: the `ci` job reuses ci.yml when invoked manually.
name: Build (staging) [GCP rollback]

on:
  workflow_dispatch: {}

concurrency:
  group: build-staging-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  # ci.yml's `changes` job (dorny/paths-filter) requests pull-requests:read; a
  # reusable-workflow job can't request a permission the caller hasn't granted
  # (else the whole run is a startup_failure), so grant it here.
  pull-requests: read

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  build-api:
    name: build api
    needs: ci
    if: ${{ needs.ci.outputs.api == 'true' }}
    uses: ./.github/workflows/_build-push.yml
    with:
      service_name: gogocash-api-staging
      dockerfile: apps/api/Dockerfile
      build_context: .

  build-admin:
    name: build admin
    needs: ci
    if: ${{ needs.ci.outputs.admin == 'true' }}
    uses: ./.github/workflows/_build-push.yml
    with:
      service_name: gogocash-admin
      dockerfile: apps/admin/Dockerfile
      build_context: .

  build-app-web:
    name: build app-web
    needs: ci
    if: ${{ needs.ci.outputs.app == 'true' }}
    uses: ./.github/workflows/_build-push.yml
    secrets: inherit
    with:
      service_name: gogocash-app-web-staging
      dockerfile: apps/app/Dockerfile.web
      build_context: apps/app
      # Expo web export runs before the image build; EXPO_PUBLIC_* env is set in
      # _build-push.yml Prebuild (backend mode + Firebase secrets).
      prebuild_command: npm run export:web -w @gogocash/mobile
