name: CI

on:
  push:
    branches: [main, master, develop, staging]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint, format, unit tests
        run: npm run validate

      - name: Build
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-min-32-chars!!"
        run: npm run build

      - name: Bundle size budget
        run: npm run perf:check-budget

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-min-32-chars!!"
          PLAYWRIGHT_NO_SERVER: "1"
          CI: "true"
        run: |
          npm run start &
          npx --yes wait-on http://127.0.0.1:3000 -t 120000
          npx playwright test

      # Transitive deps may still report criticals; drop continue-on-error after they are resolved.
      - name: npm audit (critical)
        run: npm audit --audit-level=critical
        continue-on-error: true
