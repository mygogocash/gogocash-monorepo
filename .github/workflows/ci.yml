# Monorepo CI — Turborepo-aware, path-filtered build/lint/test per app.
#
# GitHub only reads workflows from the repo-root `.github/workflows/`. The CI
# files nested under apps/api/.github and apps/landing/.github do NOT run; this
# file replaces them with a single root-level, per-app pipeline.
#
# PATH-FILTER STRATEGY
#   `on.<event>.paths` filters the WHOLE workflow, not individual jobs, so it
#   can't express "only build the app that changed" on its own. Instead a
#   `changes` job runs `dorny/paths-filter` once and emits a boolean per app;
#   each app job is gated on its own flag via `needs` + `if`. Net effect:
#     • a change under apps/admin/**   → only `admin` runs
#     • a change under apps/api/**     → only the three `api-*` jobs run
#     • a change under apps/app/**     → only `app` runs
#     • a change under apps/landing/** → only `landing` runs
#   Each filter also includes the shared root config (package.json,
#   package-lock.json, turbo.json, .nvmrc, .npmrc, and this workflow) so a root
#   change — which can affect every workspace — fans out to all app jobs.
#
# NOTE ON INSTALLS
#   The repo root `.npmrc` sets `legacy-peer-deps=true`, so a bare `npm ci`
#   already resolves the admin/api NestJS + Vite peer mix. No flag needed.
#
# DEPLOYS ARE NOT HERE. Staging deploys via Railway on push to `staging`
# (after ci-staging.yml). GCP workflows are manual rollback. See README.md.

name: CI

on:
  # Validate PRs into promotion branches (main → dev → staging → production).
  pull_request:
    branches: [main, dev, staging, production]
  push:
    branches: [main, dev]
  # Reusable: ci-staging.yml + build-staging.yml (manual GCP) call this workflow.
  workflow_call:
    outputs:
      admin:
        description: "true when apps/admin (or shared root config) changed"
        value: ${{ jobs.changes.outputs.admin }}
      api:
        description: "true when apps/api (or shared root config) changed"
        value: ${{ jobs.changes.outputs.api }}
      app:
        description: "true when apps/app (or shared root config) changed"
        value: ${{ jobs.changes.outputs.app }}
      app_ota_payload:
        description: "true when an Expo runtime bundle or asset changed"
        value: ${{ jobs.changes.outputs.app_ota_payload }}
      app_ota_unsafe:
        description: "true when native compatibility may have changed"
        value: ${{ jobs.changes.outputs.app_ota_unsafe }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── change detection — emits one boolean per app ──────────────────────────
  changes:
    name: detect changed apps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
      e2e: ${{ steps.filter.outputs.e2e }}
      app_ota_payload: ${{ steps.filter.outputs.app_ota_payload }}
      app_ota_unsafe: ${{ steps.filter.outputs.app_ota_unsafe }}
      knip: ${{ steps.filter.outputs.knip }}
      mcp: ${{ steps.filter.outputs.mcp }}
      workflow_contract: ${{ steps.filter.outputs.workflow_contract }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            root: &root
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - '.nvmrc'
              - '.npmrc'
              - '.github/workflows/ci.yml'
              - '.github/workflows/ci-staging.yml'
              - '.github/actions/**'
            admin:
              - *root
              - 'apps/admin/**'
            api:
              - *root
              - 'apps/api/**'
            app:
              - *root
              - 'apps/app/**'
            e2e:
              - *root
              - '.github/workflows/e2e-clean-runner.yml'
              - '.github/workflows/e2e-weekly.yml'
              - 'docker-compose.e2e.yml'
              - 'e2e/**'
              - 'scripts/e2e-*.sh'
              - 'apps/api/**'
              - 'apps/admin/**'
              - 'apps/app/**'
            # Automatic OTA needs both a runtime payload and an unchanged
            # native compatibility surface. Native-sensitive changes are
            # handed off for an explicit preview build instead.
            app_ota_payload:
              - 'apps/app/app/**'
              - 'apps/app/src/**'
              - 'apps/app/assets/**'
              - 'apps/app/babel.config.js'
              - 'apps/app/metro.config.js'
            app_ota_unsafe:
              - 'package.json'
              - 'package-lock.json'
              - 'apps/app/.eas/**'
              - 'apps/app/android/**'
              - 'apps/app/ios/**'
              - 'apps/app/modules/**'
              - 'apps/app/plugins/**'
              - 'apps/app/app.config.js'
              - 'apps/app/eas.json'
              - 'apps/app/package.json'
              - 'apps/app/google-services.json'
              - 'apps/app/GoogleService-Info.plist'
              - 'apps/app/assets/icon.png'
              - 'apps/app/assets/adaptive-icon.png'
              - 'apps/app/assets/adaptive-icon-bg.png'
              - 'apps/app/assets/splash.png'
              - 'apps/app/scripts/patch-expo-firebase-core-gradle.mjs'
            knip:
              - *root
              - 'apps/**'
              - 'scripts/**'
            mcp:
              - *root
              - 'packages/gototrack-mcp/**'
            workflow_contract:
              - '.github/workflows/**'
              - 'apps/app/.eas/workflows/**'
              - 'apps/app/eas.json'
              - 'scripts/ci-workflow-contract.test.mjs'
              - 'scripts/deployment/**'
              - 'scripts/gcp/artifact-registry-cleanup-policy.json'
              - 'package.json'

  # ── workflow structure contract (gate when CI definitions change) ─────────
  workflow-contract:
    name: workflow contract
    needs: changes
    if: ${{ needs.changes.outputs.workflow_contract == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Validate CI workflow contracts
        run: npm run test:workflow-contracts
      - name: Validate Expo EAS workflow schema
        run: npm run validate:eas-workflows
      - name: Actionlint all workflows (pinned 1.7.12)
        run: |
          find .github/workflows -maxdepth 1 -type f \
            \( -name '*.yml' -o -name '*.yaml' \) -print0 |
            xargs -0 docker run --rm \
              -v "$PWD:/repo" \
              -w /repo \
              rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
              -color

  # ── admin (gogocash-admin) — Next.js dashboard ────────────────────────────
  admin:
    name: admin (gogocash-admin)
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Next.js build + vitest can exceed Node's ~2GB default heap on runners
    # (exit 134 OOM). Bump it job-wide, same as the api jobs do per-step.
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
        with:
          node-options: --max-old-space-size=4096
      # Typecheck, lint, test, and build are all blocking Admin gates.
      - name: Typecheck (gate)
        # Promoted once the 128 pre-existing errors were cleared (2026-07-10).
        # Runs the workspace tsc (6.0.3 while Next pins it; 7.x when unpinned).
        run: npx turbo run typecheck --filter=gogocash-admin
      - name: Lint (gate)
        run: npm run lint:ci -w gogocash-admin
      - name: Test (gate)
        run: npx turbo run test --filter=gogocash-admin
      - name: Build (gate)
        run: npx turbo run build --filter=gogocash-admin

  # ── app (@gogocash/mobile) — Expo / React Native (web+iOS+Android) ─────────
  # Typecheck + unit + render tests are now GATES (P2-CI: all three verified
  # green). The WEB EXPORT (`expo export --platform web`) remains a gate too — it
  # exercises Metro workspace resolution + the single-hoisted-React dedupe.
  # Native builds run on EAS, not CI.
  app:
    name: app (@gogocash/mobile)
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Metro web export + vitest can exceed Node's ~2GB default heap on runners
    # (exit 134 OOM). Bump it job-wide, same as the api jobs do per-step.
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
        with:
          node-options: --max-old-space-size=4096
      - name: Typecheck (gate)
        run: npx turbo run typecheck --filter=@gogocash/mobile
      - name: Test (unit — gate)
        run: npm run test -w @gogocash/mobile
      - name: Test (render — gate)
        run: npm run test:render -w @gogocash/mobile
      - name: Build (web export — gate)
        env:
          EXPO_PUBLIC_API_URL: https://staging.example.invalid
          EXPO_PUBLIC_APP_ENV: staging
          EXPO_PUBLIC_ACCOUNT_DATA_SOURCE: fixtures
          EXPO_PUBLIC_FRONTEND_URL: https://staging.example.invalid
        run: npm run export:web -w @gogocash/mobile

  # ── api (gogocash-api) — NestJS backend ───────────────────────────────────
  # LINT and TEST are BOTH GATES now.
  #   • Lint: the eslint 8→9 flat-config migration (Tier 1 #1) cleared the debt.
  #   • Test: Tier 1 #6 replaced the 13 nest-g scaffold stubs (which only did
  #     expect(x).toBeDefined() and failed on unwired deps) with real behavior
  #     specs and bumped jest 29→30. The full suite is green (30 suites / 385
  #     tests), so the "do not gate until repaired" note no longer applies —
  #     continue-on-error dropped.
  api-lint:
    name: api lint
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
      - name: Lint (no --fix)
        # Type-aware lint (typescript-eslint with parserOptions.project) builds
        # a full TS program; under TypeScript 6 that exceeds Node's ~2GB default
        # heap on the runner (exit 134 OOM). Bump it, same as the build/test jobs.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run lint:ci -w gogocash-api

  api-test:
    name: api unit tests
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
        with:
          node-options: --max-old-space-size=4096
      - name: Jest
        # Jest exceeds Node's ~2GB default heap running all api suites (exit
        # 134); bump it, same as the build/lint jobs.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test -w gogocash-api

  # The REQUIRED gate (preserved from the original): nest build (type-check) +
  # a real boot of the compiled artifact against an ephemeral Mongo, probing /.
  # Catches DI / bootstrap crashes that tsc and the unit specs both miss.
  #
  # Branch protection (Settings → Branches): production is locked; require CI on
  # main / dev / staging when you add rules there.
  #   Require status checks:  "api build + boot smoke (required)", "api lint",
  #   and "api unit tests" — all three are now gates.
  api-build-smoke:
    name: api build + boot smoke (required)
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongo:
        image: mongo:8.0.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
        with:
          node-options: --max-old-space-size=4096

      - name: Typecheck (native tsc — gate)
        # Type checking is a standalone gate since the swc build (below) is
        # transpile-only. TS 7's native tsc replaces the old in-build tsc that
        # exceeded Node's 2GB heap on runners (exit 134).
        run: npm run typecheck -w gogocash-api

      - name: Build (swc)
        # Transpile-only emit (`swc src -d dist`); decorator metadata + src/*
        # path rewriting come from apps/api/.swcrc. Types are gated above.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build -w gogocash-api

      - name: Boot smoke test
        # Boots the compiled artifact against the ephemeral Mongo and probes /.
        # If the DI graph can't resolve (e.g. a guard's JwtService is unavailable
        # in its module), `node dist/main` exits before listening and this fails.
        # Dummy secrets are fine: nothing validates them at boot EXCEPT Resend,
        # whose client constructor throws on an empty key — so RESEND_API_KEY
        # must be a non-empty dummy. (Firebase uses applicationDefault() lazily;
        # PostHog stays disabled with no keys.) No real credentials
        # are referenced; the smoke test never sends email.
        working-directory: apps/api
        env:
          NODE_ENV: production
          PORT: "8080"
          NODE_OPTIONS: --max-old-space-size=4096
          MONGO_URI: mongodb://localhost:27017/smoke
          JWT_SECRET: ci-smoke-dummy
          JWT_ADMIN_SECRET: ci-smoke-dummy
          FIREBASE_PROJECT_ID: demo-smoke
          RESEND_API_KEY: re_ci_smoke_dummy
        run: |
          set -uo pipefail
          npm run start:prod > /tmp/boot.log 2>&1 &
          APP_PID=$!
          ok=0
          for _ in $(seq 1 45); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::App process exited during boot — DI/bootstrap failure"
              echo "----- boot log -----"; cat /tmp/boot.log
              exit 1
            fi
            if curl -fsS "http://localhost:8080/" >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          kill "$APP_PID" 2>/dev/null || true
          if [ "$ok" -ne 1 ]; then
            echo "::error::App did not become reachable on / within 45s"
            echo "----- boot log -----"; cat /tmp/boot.log
            exit 1
          fi
          echo "Booted and responded on / — DI graph resolved, app starts cleanly."

      - name: Integration test (checkWithdraw vs real Mongo 8 / mongoose 9)
        # Exercises the withdraw balance aggregation end-to-end against the
        # ephemeral Mongo — covers the #36 risk (mongoose-9 strictQuery /
        # sanitizeFilter / find-lean defaults) that the mock-based unit specs
        # can't. Skips automatically when MONGO_URI is unset (e.g. local runs).
        working-directory: apps/api
        env:
          # Booting the full Nest app against real Mongo for this e2e exceeds
          # Node's ~2GB default heap on the runner (exit 134 OOM). Bump it, same
          # as the Build (type-check) and Boot smoke steps above.
          NODE_OPTIONS: --max-old-space-size=4096
          MONGO_URI: mongodb://localhost:27017/inttest
        run: npx jest --config ./test/jest-e2e.json withdraw-balance --runInBand

      - name: Start isolated Mongo rs0 for quest task-v2
        env:
          QUEST_RS_CONTAINER: gogocash-quest-rs0-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          docker run --detach --name "$QUEST_RS_CONTAINER" \
            --publish 27019:27019 \
            --env GLIBC_TUNABLES=glibc.pthread.rseq=1 \
            mongo:8.0.4 \
            --replSet rs0 --bind_ip_all --port 27019
          ready=0
          for _ in $(seq 1 30); do
            if docker exec "$QUEST_RS_CONTAINER" mongosh --quiet \
              mongodb://localhost:27019/admin --eval 'db.runCommand({ ping: 1 }).ok' \
              | grep -qx '1'; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            docker logs "$QUEST_RS_CONTAINER"
            exit 1
          fi
          docker exec "$QUEST_RS_CONTAINER" mongosh --quiet \
            mongodb://localhost:27019/admin --eval \
            'rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "localhost:27019" }] })'
          primary=0
          for _ in $(seq 1 30); do
            state=$(docker exec "$QUEST_RS_CONTAINER" mongosh --quiet \
              mongodb://localhost:27019/admin --eval \
              'try { rs.status().members[0].stateStr } catch(e) { "UNKNOWN" }')
            if [ "$state" = "PRIMARY" ]; then
              primary=1
              break
            fi
            sleep 2
          done
          if [ "$primary" -ne 1 ]; then
            docker logs "$QUEST_RS_CONTAINER"
            exit 1
          fi

      - name: Quest task-v2 real Mongo rs0 (required)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          MONGO_URI: mongodb://localhost:27019/quest-task-ci?replicaSet=rs0
          MONGO_REPLICA_SET: "1"
        run: npm run test:e2e -w gogocash-api -- --runInBand test/quest-task-progress.e2e-spec.ts

      - name: Stop isolated Mongo rs0 for quest task-v2
        if: ${{ always() }}
        env:
          QUEST_RS_CONTAINER: gogocash-quest-rs0-${{ github.run_id }}-${{ github.run_attempt }}
        run: docker rm --force "$QUEST_RS_CONTAINER" 2>/dev/null || true

  # ── GoGoTrack (gate when api or app changes) ───────────────────────────────
  gototrack:
    name: gototrack tests
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.app == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
        with:
          node-options: --max-old-space-size=4096
      - name: API GoGoTrack specs
        if: ${{ needs.changes.outputs.api == 'true' }}
        run: npm run test:gototrack:api -w @gogocash/mobile
      - name: Mobile GoGoTrack specs
        if: ${{ needs.changes.outputs.app == 'true' }}
        run: npm run test:gototrack -w @gogocash/mobile

  # ── gototrack-mcp package (gate — previously had no CI coverage) ──────────
  gototrack-mcp:
    name: gototrack-mcp (typecheck + build + test)
    needs: changes
    if: ${{ needs.changes.outputs.mcp == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
      - name: Typecheck (native tsc — gate)
        run: npm run typecheck -w @gogocash/gototrack-mcp
      - name: Build (gate)
        run: npm run build -w @gogocash/gototrack-mcp
      - name: Test (gate)
        run: npm run test -w @gogocash/gototrack-mcp

  # ── dead-code scan (gate, path-filtered) ──────────────────────────────────
  knip:
    name: dead-code scan
    needs: changes
    if: ${{ needs.changes.outputs.knip == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-monorepo
      - run: npx knip --no-progress

  # One stable required check for branch protection. Conditional jobs may be
  # skipped only by their path filters; failures and cancellations fail here.
  ci-gate:
    name: CI gate (required)
    needs:
      - changes
      - admin
      - app
      - api-lint
      - api-test
      - api-build-smoke
      - e2e-root
      - gototrack
      - gototrack-mcp
      - knip
      - workflow-contract
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Require every selected gate to pass
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: node scripts/deployment/ci-required-gate.mjs

  # ── required full-stack E2E on an isolated hosted runner ─────────────────
  e2e-root:
    name: root E2E exact SHA
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' }}
    uses: ./.github/workflows/e2e-clean-runner.yml
    with:
      candidate_sha: ${{ github.event.pull_request.head.sha || github.sha }}
