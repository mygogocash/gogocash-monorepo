# API CI — pull-request gate for the backend.
#
# Runs on every PR (and push) targeting `staging` / `main`. Three jobs:
#   • build-smoke (REQUIRED) — `nest build` (type-check) + a real boot against an
#       ephemeral Mongo, probing `/`. Catches DI / bootstrap crashes that tsc and
#       the unit specs both miss — e.g. a controller whose guard needs JwtService
#       but whose module never registers JwtModule (the app compiles, then fails
#       to start). This is the gate with teeth.
#   • lint  (informational) — eslint without --fix.
#   • test  (informational) — jest. NOTE: 14/21 suites are currently red on
#       `staging` (auto-generated `nest g` stubs that never provided their deps).
#       Kept non-blocking until those stubs are repaired or removed; then drop
#       `continue-on-error` and mark this job required too.
#
# Branch protection (Settings → Branches → add rule for `staging` and `main`):
#   Require status check:  "Build + boot smoke (required)"
#   Do NOT require lint/test yet — see the note above.

name: API CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint:ci

  test:
    name: Unit tests (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      # 14/21 suites are red on staging today (nest-g scaffolding stubs with no
      # deps wired). Informational until repaired — do not gate merges on this.
      - run: npm run test

  build-smoke:
    name: Build + boot smoke (required)
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Build (type-check)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Boot smoke test
        # Boots the compiled artifact against the ephemeral Mongo and probes `/`.
        # If the DI graph can't resolve (e.g. a guard's JwtService is unavailable
        # in its module), `node dist/main` exits before listening and this fails.
        # Dummy secrets are fine: nothing validates them at boot (Firebase uses
        # applicationDefault() lazily; PostHog/Customer.io stay disabled with no
        # keys). No real credentials are referenced.
        env:
          NODE_ENV: production
          PORT: "8080"
          MONGO_URI: mongodb://localhost:27017/smoke
          JWT_SECRET: ci-smoke-dummy
          JWT_ADMIN_SECRET: ci-smoke-dummy
          FIREBASE_PROJECT_ID: demo-smoke
        run: |
          set -uo pipefail
          npm run start:prod > /tmp/boot.log 2>&1 &
          APP_PID=$!
          ok=0
          for i in $(seq 1 45); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::App process exited during boot — DI/bootstrap failure"
              echo "----- boot log -----"; cat /tmp/boot.log
              exit 1
            fi
            if curl -fsS "http://localhost:8080/" >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          kill "$APP_PID" 2>/dev/null || true
          if [ "$ok" -ne 1 ]; then
            echo "::error::App did not become reachable on / within 45s"
            echo "----- boot log -----"; cat /tmp/boot.log
            exit 1
          fi
          echo "✅ Booted and responded on / — DI graph resolved, app starts cleanly."
