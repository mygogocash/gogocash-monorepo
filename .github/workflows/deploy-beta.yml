# Deploy Backend API to Cloud Run — api-beta.gogocash.co
# Scaffold — awaits infra setup before first successful run.
#
# ─── TODO — beta infrastructure setup ─────────────────────────────────
#   1. Decide on GCP project:
#      - Option A (simplest): reuse gogocash-staging, add new Cloud Run
#        service gogocash-api-beta alongside the staging one.
#      - Option B (cleaner): new project gogocash-beta with own Artifact
#        Registry + Secret Manager + WIF provider.
#      This scaffold assumes Option A (GCP_PROJECT_ID=gogocash-staging)
#      with env-specific secrets in the same project.
#   2. After first deploy, add custom domain in Cloud Run Console:
#        Cloud Run → gogocash-api-beta → Custom domains → api-beta.gogocash.co
#   3. Create Secret Manager entries in gogocash-staging project:
#        gogocash-beta-mongo-uri, gogocash-beta-jwt-secret,
#        gogocash-beta-jwt-admin-secret, gogocash-beta-firebase-project-id,
#        gogocash-beta-involve-secret, gogocash-beta-posthog-key,
#        gogocash-beta-telegram-bot-token, gogocash-beta-crossmint-*
# ──────────────────────────────────────────────────────────────────────

name: Deploy API (beta)

on:
  push:
    branches:
      - beta
  workflow_dispatch:

concurrency:
  group: api-beta-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm run test
        continue-on-error: true

      - name: Build (type-check)
        # nest build (tsc) exceeds Node's 2GB default heap on runners (exit 134)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

  deploy:
    name: Docker → Artifact Registry → Cloud Run
    needs: test
    runs-on: ubuntu-latest
    env:
      REGION: asia-southeast1
      SERVICE_NAME: gogocash-api-beta
      ARTIFACT_REPO: gogocash

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_BETA || vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_BETA || vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            --cache-from ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "NODE_ENV=production,WEB_APP_URL=https://app-beta.gogocash.co,API_BASE_URL=https://api-beta.gogocash.co,POSTHOG_HOST=https://us.i.posthog.com,POSTHOG_ENABLED=true" \
            --set-secrets "MONGO_URI=gogocash-beta-mongo-uri:latest,JWT_SECRET=gogocash-beta-jwt-secret:latest,JWT_ADMIN_SECRET=gogocash-beta-jwt-admin-secret:latest,FIREBASE_PROJECT_ID=gogocash-beta-firebase-project-id:latest,INVOLVE_SECRET=gogocash-beta-involve-secret:latest,POSTHOG_KEY=gogocash-beta-posthog-key:latest,TELEGRAM_BOT_TOKEN=gogocash-beta-telegram-bot-token:latest,CROSSMINT_AUTH_BASE=gogocash-beta-crossmint-auth-base:latest,CROSSMINT_PROJECT_ID=gogocash-beta-crossmint-project-id:latest,CROSSMINT_SECRET=gogocash-beta-crossmint-secret:latest" \
            --project ${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }}

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID_BETA || vars.GCP_PROJECT_ID }} \
            --format "value(status.url)"
