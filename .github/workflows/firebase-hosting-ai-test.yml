# Deploy Admin Panel static export to Firebase Hosting (gogocash-admin-ai-test).
# Triggered on push to `ai-test` branch. Isolated AI-test environment.

name: Deploy Firebase Hosting (ai-test)

on:
  push:
    branches:
      - ai-test
  workflow_dispatch:

concurrency:
  group: firebase-ai-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.FIREBASE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.FIREBASE_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Build static export (Firebase)
        run: npm run build:firebase
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_STAGING }}
          NEXTAUTH_URL: https://admin-ai-test.gogocash.co
          NEXT_PUBLIC_API_URL: https://api-ai-test.gogocash.co
          NEXT_PUBLIC_APP_URL: https://app-ai-test.gogocash.co
          NEXT_PUBLIC_APP_ENV: ai-test
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase deploy --only hosting --project gogocash-staging --non-interactive \
            --token "${{ steps.auth.outputs.access_token }}"
