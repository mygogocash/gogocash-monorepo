# Weekly rerun of the same exact-SHA full-stack harness required by CI.
name: E2E weekly

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

concurrency:
  group: e2e-weekly
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    uses: ./.github/workflows/e2e-clean-runner.yml
    with:
      candidate_sha: ${{ github.sha }}
