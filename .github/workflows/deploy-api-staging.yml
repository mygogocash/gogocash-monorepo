# Deploy Backend API to Cloud Run — api-staging.gogocash.co  (STAGING ONLY).
#
# Ported from the (now inert) apps/api/.github/workflows/deploy-staging.yml to
# the repo ROOT with MONOREPO build context: the image is built from the repo
# root with `-f apps/api/Dockerfile .` so `npm ci` resolves the single root
# package-lock.json (see apps/api/Dockerfile header).
#
# TRIGGER: workflow_dispatch ONLY. There is NO `on: push` — staging deploys are
# manual until Phase 5 cutover. This deploys a real money platform; keep it
# operator-initiated.
#
# ─── Required GitHub variables (Settings → Secrets and variables → Actions → Variables) ───
#   GCP_PROJECT_ID        gogocash-staging
#   GCP_WIF_PROVIDER      projects/729804769570/locations/global/workloadIdentityPools/github-actions/providers/github
#   GCP_SERVICE_ACCOUNT   github-actions-api@gogocash-staging.iam.gserviceaccount.com
#
# ─── Required Secret Manager secrets (project gogocash-staging) ───
#   gogocash-staging-mongo-uri            gogocash-staging-jwt-secret
#   gogocash-staging-jwt-admin-secret     gogocash-staging-firebase-project-id
#   gogocash-staging-involve-secret       gogocash-staging-posthog-key
#   gogocash-staging-telegram-bot-token   gogocash-staging-crossmint-auth-base
#   gogocash-staging-crossmint-project-id gogocash-staging-crossmint-secret
#   gogocash-staging-resend-api-key
#   Cloud Run runtime SA needs roles/storage.objectAdmin on GCS_CATALOG_BUCKET.
# ─── After first deploy (MANUAL) ───
#   1. Cloud Run → gogocash-api-staging → Custom domains → api-staging.gogocash.co
#   2. Add the CNAME Cloud Run gives you to your DNS provider.

name: Deploy API (staging)

on:
  workflow_dispatch:

concurrency:
  group: api-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Install (root, workspace-aware)
        run: npm ci

      - name: Run tests
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test -w gogocash-api

      - name: Build (type-check)
        # nest build (tsc) exceeds Node's 2GB default heap on runners (exit 134)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build -w gogocash-api

  deploy:
    name: Docker → Artifact Registry → Cloud Run
    needs: test
    runs-on: ubuntu-latest
    env:
      REGION: asia-southeast1
      SERVICE_NAME: gogocash-api-staging
      ARTIFACT_REPO: gogocash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image (monorepo context)
        # MONOREPO build context: `-f apps/api/Dockerfile .` from the repo root.
        run: |
          docker build \
            -f apps/api/Dockerfile \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            --cache-from ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "NODE_ENV=production,WEB_APP_URL=https://app-staging.gogocash.co,API_BASE_URL=https://api-staging.gogocash.co,POSTHOG_HOST=https://us.i.posthog.com,POSTHOG_ENABLED=true,MAIL_FROM=GoGoCash <noreply@gogocash.co>,ADMIN_APP_URL=https://admin-staging.gogocash.co,GCS_CATALOG_BUCKET=gogocash-catalog-staging" \
            --set-secrets "MONGO_URI=gogocash-staging-mongo-uri:latest,JWT_SECRET=gogocash-staging-jwt-secret:latest,JWT_ADMIN_SECRET=gogocash-staging-jwt-admin-secret:latest,FIREBASE_PROJECT_ID=gogocash-staging-firebase-project-id:latest,INVOLVE_SECRET=gogocash-staging-involve-secret:latest,POSTHOG_KEY=gogocash-staging-posthog-key:latest,TELEGRAM_BOT_TOKEN=gogocash-staging-telegram-bot-token:latest,CROSSMINT_AUTH_BASE=gogocash-staging-crossmint-auth-base:latest,CROSSMINT_PROJECT_ID=gogocash-staging-crossmint-project-id:latest,CROSSMINT_SECRET=gogocash-staging-crossmint-secret:latest,RESEND_API_KEY=gogocash-staging-resend-api-key:latest" \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)"

      - name: Smoke GoGoSense merchant catalog
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)")

          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${URL}/gogosense/merchants" || echo 000)
          case "$code" in
            2*|3*) echo "GoGoSense merchant catalog route is reachable ($code)." ;;
            *)
              echo "::error::GoGoSense merchant catalog smoke failed (HTTP $code)"
              exit 1
              ;;
          esac
