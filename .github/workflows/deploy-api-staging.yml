# ⚠️ PAUSED / KNOWN-BROKEN (2026-07-10, founder decision): every run of this
# workflow has failed because two Secret Manager secrets were never created in
# project gogocash-staging:
#   gogocash-staging-r2-access-key-id
#   gogocash-staging-r2-secret-access-key
# Live staging (api-staging.gogocash.co) is served by Railway auto-deploy and
# is NOT affected — a red run here does not mean staging is broken. To revive
# this Cloud Run rehearsal lane: mint an R2 S3 API token (Cloudflare → R2 →
# Manage R2 API Tokens, bucket gogocash-catalog-staging), create both secrets
# (`gcloud secrets create <name> --data-file=- --project gogocash-staging`),
# then dispatch this workflow.
#
# LEGACY GCP one-shot deploy — prefer build-staging.yml + release-staging.yml.
# Staging primary path is Railway (push to staging branch).
#
# Deploy Backend API to Cloud Run — api-staging.gogocash.co  (STAGING ONLY).
# Monorepo build context: image built from repo root with `-f apps/api/Dockerfile .`
#
# TRIGGER: workflow_dispatch ONLY. There is NO `on: push` — staging deploys are
# manual until Phase 5 cutover. This deploys a real money platform; keep it
# operator-initiated.
#
# ─── Required GitHub variables (Settings → Secrets and variables → Actions → Variables) ───
#   GCP_PROJECT_ID        gogocash-staging
#   GCP_WIF_PROVIDER      projects/729804769570/locations/global/workloadIdentityPools/github-actions/providers/github
#   GCP_SERVICE_ACCOUNT   github-actions-api@gogocash-staging.iam.gserviceaccount.com
#
# ─── Required Secret Manager secrets (project gogocash-staging) ───
#   gogocash-staging-mongo-uri            gogocash-staging-jwt-secret
#   gogocash-staging-jwt-admin-secret     gogocash-staging-firebase-project-id
#   gogocash-staging-involve-secret       gogocash-staging-involve-postback-secret
#   gogocash-staging-posthog-key
#   gogocash-staging-telegram-bot-token   gogocash-staging-crossmint-auth-base
#   gogocash-staging-crossmint-project-id gogocash-staging-crossmint-secret
#   gogocash-staging-resend-api-key
#   gogocash-staging-r2-access-key-id       gogocash-staging-r2-secret-access-key
#   (R2 S3 API token from Cloudflare → R2 → Manage R2 API Tokens)
# ─── After first deploy (MANUAL) ───
#   1. Cloud Run → gogocash-api-staging → Custom domains → api-staging.gogocash.co
#   2. Add the CNAME Cloud Run gives you to your DNS provider.

name: Deploy API (staging)

on:
  workflow_dispatch:

concurrency:
  group: api-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Install (root, workspace-aware)
        run: npm ci

      - name: Run tests
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test -w gogocash-api

      - name: Typecheck (native tsc — gate)
        # Standalone gate: the swc build below is transpile-only.
        run: npm run typecheck -w gogocash-api

      - name: Build (swc)
        # Transpile-only emit; decorators/paths via apps/api/.swcrc.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build -w gogocash-api

  deploy:
    name: Docker → Artifact Registry → Cloud Run
    needs: test
    runs-on: ubuntu-latest
    env:
      REGION: asia-southeast1
      SERVICE_NAME: gogocash-api-staging
      ARTIFACT_REPO: gogocash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image (monorepo context)
        # MONOREPO build context: `-f apps/api/Dockerfile .` from the repo root.
        run: |
          docker build \
            -f apps/api/Dockerfile \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            --cache-from ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1 \
            --cpu-boost \
            --set-env-vars "NODE_ENV=production,WEB_APP_URL=https://app-staging.gogocash.co,API_BASE_URL=https://api-staging.gogocash.co,POSTHOG_HOST=https://us.i.posthog.com,POSTHOG_ENABLED=true,MAIL_FROM=GoGoCash <noreply@gogocash.co>,ADMIN_APP_URL=https://admin-staging.gogocash.co,R2_BUCKET=gogocash-catalog-staging,R2_ENDPOINT=https://187ab61ed9dbc6e616cb23e6b95aa8f1.r2.cloudflarestorage.com,R2_PUBLIC_BASE_URL=https://media-staging.gogocash.co" \
            --set-secrets "MONGO_URI=gogocash-staging-mongo-uri:latest,JWT_SECRET=gogocash-staging-jwt-secret:latest,JWT_ADMIN_SECRET=gogocash-staging-jwt-admin-secret:latest,FIREBASE_PROJECT_ID=gogocash-staging-firebase-project-id:latest,INVOLVE_SECRET=gogocash-staging-involve-secret:latest,INVOLVE_POSTBACK_SECRET=gogocash-staging-involve-postback-secret:latest,POSTHOG_KEY=gogocash-staging-posthog-key:latest,TELEGRAM_BOT_TOKEN=gogocash-staging-telegram-bot-token:latest,CROSSMINT_AUTH_BASE=gogocash-staging-crossmint-auth-base:latest,CROSSMINT_PROJECT_ID=gogocash-staging-crossmint-project-id:latest,CROSSMINT_SECRET=gogocash-staging-crossmint-secret:latest,RESEND_API_KEY=gogocash-staging-resend-api-key:latest,R2_ACCESS_KEY_ID=gogocash-staging-r2-access-key-id:latest,R2_SECRET_ACCESS_KEY=gogocash-staging-r2-secret-access-key:latest" \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Fetch Cloud Run logs on deploy failure
        if: failure()
        run: |
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="${{ env.SERVICE_NAME }}"' \
            --limit=30 \
            --format='value(textPayload,jsonPayload.message)' \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --freshness=15m || true

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)"

      - name: Smoke GoGoTrack merchant catalog
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)")

          # lazyConnection defers the first Mongo handshake; retry until the
          # catalog route responds (empty [] is fine — we only need liveness).
          attempts=12
          sleep_seconds=5
          for attempt in $(seq 1 "$attempts"); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${URL}/gototrack/merchants" || echo 000)
            case "$code" in
              2*|3*)
                echo "GoGoTrack merchant catalog route is reachable ($code) on attempt ${attempt}/${attempts}."
                exit 0
                ;;
              *)
                echo "Attempt ${attempt}/${attempts}: HTTP $code — waiting ${sleep_seconds}s for Mongo lazy connect…"
                sleep "$sleep_seconds"
                ;;
            esac
          done

          echo "::error::GoGoTrack merchant catalog smoke failed after ${attempts} attempts (last HTTP $code)"
          exit 1
