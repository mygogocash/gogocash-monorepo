# Maestro smoke — manual dispatch; requires self-hosted runner with Maestro + device/emulator.
# Default GitHub-hosted ubuntu-latest cannot run Android flows. See README.md.
name: Maestro Smoke

on:
  workflow_dispatch:
    inputs:
      apk_path:
        description: "Path to dev-client APK (optional if device already has app)"
        required: false
        type: string
      device_id:
        description: "Maestro device_id from `maestro start-device` / `list_devices`"
        required: false
        type: string
        default: "chromium"

permissions:
  contents: read

jobs:
  maestro:
    name: Maestro flows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maestro not on hosted runner
        run: |
          echo "::notice::Maestro smoke requires a self-hosted runner with Maestro CLI + Android emulator or Maestro Cloud."
          echo "Local: cd apps/app && maestro test .maestro/flows/"
          echo "Device: ${{ inputs.device_id }}"
          echo "Optional APK: ${{ inputs.apk_path }}"
          exit 0
