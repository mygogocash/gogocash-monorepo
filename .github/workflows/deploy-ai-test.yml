# Deploy Customer App to Firebase App Hosting — app-ai-test.gogocash.co
# Triggered on push to the `ai-test` branch.
# Isolated AI-testing environment, deploys to the gogocash-web-ai-test backend.

name: Deploy Customer App (ai-test)

on:
  push:
    branches:
      - ai-test
  workflow_dispatch:

concurrency:
  group: app-ai-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        env:
          SKIP_ENV_VALIDATION: "1"
        run: npm run lint && npm run format:check && npm run i18n:check
        continue-on-error: true

      - name: Unit tests
        env:
          SKIP_ENV_VALIDATION: "1"
          NODE_ENV: test
        run: npm run test
        continue-on-error: true

      - name: Build (ai-test env)
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-min-32-chars!!"
          NEXT_PUBLIC_API_BASE_URL: https://api-ai-test.gogocash.co
          NEXT_PUBLIC_MOCK_API: "0"
          NEXTAUTH_URL: https://app-ai-test.gogocash.co
        run: npm run build

  deploy:
    name: Firebase App Hosting deploy
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.FIREBASE_WIF_PROVIDER }}
          service_account: ${{ vars.FIREBASE_SA_EMAIL }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Firebase App Hosting
        run: |
          npx firebase-tools deploy --only apphosting \
            --project gogocash-app-staging \
            --non-interactive \
            --force \
            --token "${{ steps.auth.outputs.access_token }}"
