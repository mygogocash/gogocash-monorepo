# Publish OTA update to staging channel when mobile app changes merge to staging.
# Requires repository secret EXPO_TOKEN (expo.dev access token).

name: App OTA Staging

on:
  push:
    branches: [staging]
    paths:
      - "apps/app/**"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  ota:
    name: EAS Update staging
    runs-on: ubuntu-latest
    # `staging` GitHub Environment supplies the EXPO_PUBLIC_FIREBASE_* secrets.
    environment: staging
    env:
      EXPO_PUBLIC_EAS_PROJECT_ID: 0039c25f-f88e-491d-8da9-85b8d6e66558
      # `eas update` inlines EXPO_PUBLIC_* into the JS bundle at export time and
      # does NOT read eas.json build-profile env. Omitting these ships an OTA
      # bundle that falls back to app.config.ts envDefaults (fixtures mode).
      EXPO_PUBLIC_API_URL: https://api-staging.gogocash.co
      EXPO_PUBLIC_APP_ENV: staging
      EXPO_PUBLIC_ACCOUNT_DATA_SOURCE: backend
      EXPO_PUBLIC_FRONTEND_URL: https://app-staging.gogocash.co
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      # Social sign-in activation. The Google web client id is a PUBLIC OAuth
      # identifier (ships in every app bundle) from the gogocash-staging
      # project — literal here so activation needs no extra secret setup.
      # NATIVE_OAUTH_PROVIDERS stays a secret-backed flag: set it to
      # "facebook" (later "facebook,apple") to flip the hosted flows via OTA.
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 729804769570-jlg4fpajbbvur587dcv9qpocfhn6aots.apps.googleusercontent.com
      EXPO_PUBLIC_NATIVE_OAUTH_PROVIDERS: ${{ secrets.EXPO_PUBLIC_NATIVE_OAUTH_PROVIDERS }}
      EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
      EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      NODE_PATH: ${{ github.workspace }}/node_modules:${{ github.workspace }}/apps/app/node_modules
    defaults:
      run:
        working-directory: apps/app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - name: Use repository npm version
        run: npm install --global npm@10.9.8

      - name: Check EXPO_TOKEN
        id: expo_token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN secret not set — skipping OTA (configure in repo Settings → Secrets)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up EAS / Expo
        if: steps.expo_token.outputs.skip != 'true'
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install (root, workspace-aware)
        if: steps.expo_token.outputs.skip != 'true'
        working-directory: .
        run: npm ci

      - name: Publish staging OTA
        if: steps.expo_token.outputs.skip != 'true'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          eas update --non-interactive --channel staging --message "ci-staging: $COMMIT_SHA"
