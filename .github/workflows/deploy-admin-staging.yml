# Deploy Admin dashboard to Cloud Run — admin-staging.gogocash.co  (STAGING ONLY).
#
# Builds apps/admin (Next.js standalone) from the MONOREPO root context
# (`-f apps/admin/Dockerfile .`, see apps/admin/Dockerfile header) IN-RUNNER
# (GitHub ubuntu runners are amd64/linux, so `docker build` produces a
# Cloud-Run-compatible image natively), pushes to Artifact Registry, and
# deploys to the existing Cloud Run service `gogocash-admin`.
#
# NOTE: this lane originally used `gcloud builds submit` to honor a "LEGACY
# logging" Cloud Build option from the Phase 3 plan. That required the WIF
# service account to also hold roles/cloudbuild.builds.editor. We switched to an
# in-runner `docker build` (identical to the API + app-web lanes) so the lane
# works with the SA's existing roles (Artifact Registry Writer + Cloud Run Admin
# + Service Account User) — no extra IAM. `logging: LEGACY` only affected the
# BUILD's own logs, not the Cloud Run service, so nothing runtime-facing changes.
#
# TRIGGER: workflow_dispatch ONLY. There is NO `on: push`.
#
# ─── Required GitHub variables (Settings → Secrets and variables → Actions → Variables) ───
#   GCP_PROJECT_ID        gogocash-staging
#   GCP_WIF_PROVIDER      projects/729804769570/locations/global/workloadIdentityPools/github-actions/providers/github
#   GCP_SERVICE_ACCOUNT   github-actions-api@gogocash-staging.iam.gserviceaccount.com
#       (reuses the same WIF service account as the API lane.)
#
# ─── No Secret Manager secrets needed at build OR deploy ───
#   NEXT_PUBLIC_API_URL is baked into the image at build time (defaults to
#   https://api-staging.gogocash.co, see apps/admin/Dockerfile). The deploy does
#   not pass --set-secrets, so the existing service's NextAuth env is retained.
#
# Health check: `/` returns 307 (auth redirect) once live.

name: Deploy Admin (staging)

on:
  workflow_dispatch:

concurrency:
  group: admin-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: docker build → Cloud Run
    runs-on: ubuntu-latest
    env:
      REGION: asia-southeast1
      SERVICE_NAME: gogocash-admin
      ARTIFACT_REPO: gogocash
      IMAGE_NAME: gogocash-admin

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image (monorepo context, in-runner)
        # MONOREPO build context: `-f apps/admin/Dockerfile .` from the repo root.
        # NEXT_PUBLIC_API_URL defaults to the staging API in the Dockerfile.
        run: |
          docker build \
            -f apps/admin/Dockerfile \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest \
            --cache-from ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)"
