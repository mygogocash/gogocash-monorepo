# Reusable: build a Docker image from the monorepo and push it to Artifact
# Registry, tagged with the commit SHA + a moving `:staging-candidate` tag.
# Called by build-staging.yml (one invocation per selected app). Deploys NOTHING
# — the release is a separate, human-initiated step (release-staging.yml).
#
# GCP auth is via Workload Identity Federation; the WIF vars come from the
# `staging` GitHub Environment (GCP_PROJECT_ID / GCP_WIF_PROVIDER /
# GCP_SERVICE_ACCOUNT).
name: _build-push (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: Cloud Run service / image name (also the Artifact Registry image)
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile (from the repo root)
        required: true
        type: string
      build_context:
        description: Docker build context path
        required: false
        type: string
        default: "."
      prebuild_command:
        # STATIC string supplied by the trusted caller (build-staging.yml) — not
        # from any event payload — so it is safe to run. Used by app-web to run
        # the Expo web export (with its EXPO_PUBLIC_* baked in) before the image
        # build. Empty for api/admin (their Dockerfiles build from source).
        description: Optional shell command to run before `docker build`
        required: false
        type: string
        default: ""
      region:
        required: false
        type: string
        default: asia-southeast1
      artifact_repo:
        required: false
        type: string
        default: gogocash
    secrets:
      EXPO_PUBLIC_FIREBASE_API_KEY:
        required: false
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:
        required: false
      EXPO_PUBLIC_FIREBASE_PROJECT_ID:
        required: false
      EXPO_PUBLIC_FIREBASE_APP_ID:
        required: false
    outputs:
      image_sha:
        description: Exact 40-character source commit used as the image tag
        value: ${{ jobs.build-push.outputs.image_sha }}
      image_uri:
        description: Fully qualified image reference using the source commit tag
        value: ${{ jobs.build-push.outputs.image_uri }}
      image_digest:
        description: Registry digest resolved after the image was pushed
        value: ${{ jobs.build-push.outputs.image_digest }}

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    name: build + push ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_sha: ${{ steps.image.outputs.image_sha }}
      image_uri: ${{ steps.image.outputs.image_uri }}
      image_digest: ${{ steps.image.outputs.image_digest }}
    env:
      IMAGE: ${{ inputs.region }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ inputs.artifact_repo }}/${{ inputs.service_name }}
      IMAGE_SHA: ${{ github.sha }}
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - name: Validate exact image SHA
        run: |
          if [[ ! "$IMAGE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Expected github.sha to be a full lowercase 40-character commit SHA."
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        if: ${{ inputs.prebuild_command != '' }}
        with:
          node-version: "24"
          cache: npm

      - name: Use repository npm version
        if: ${{ inputs.prebuild_command != '' }}
        run: npm install --global npm@10.9.8

      - name: Install (root, workspace-aware)
        if: ${{ inputs.prebuild_command != '' }}
        run: npm ci

      - name: Prebuild
        if: ${{ inputs.prebuild_command != '' }}
        env:
          # Expo Web export (app-web only): bake staging API + backend mode + Firebase
          # client config into the static bundle. Requires repo/environment secrets
          # EXPO_PUBLIC_FIREBASE_* on the `staging` GitHub Environment.
          EXPO_PUBLIC_API_URL: https://api-staging.gogocash.co
          EXPO_PUBLIC_APP_ENV: staging
          EXPO_PUBLIC_ACCOUNT_DATA_SOURCE: backend
          EXPO_PUBLIC_FRONTEND_URL: https://app-staging.gogocash.co
          EXPO_PUBLIC_LIFF_ID: ${{ vars.EXPO_PUBLIC_LIFF_ID }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: ${{ inputs.prebuild_command }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Build image (in-runner; GitHub runners are amd64 = Cloud-Run-compatible)
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            --build-arg NEXT_PUBLIC_API_URL=https://api-staging.gogocash.co \
            --build-arg NEXT_PUBLIC_ENABLE_CREDIT_SCORE=0 \
            --build-arg NEXT_PUBLIC_ENABLE_GOGOPASS=0 \
            --tag "$IMAGE:$IMAGE_SHA" \
            --tag "$IMAGE:staging-candidate" \
            --cache-from "$IMAGE:staging-candidate" \
            "${{ inputs.build_context }}"

      - name: Push image
        run: |
          docker push "$IMAGE:$IMAGE_SHA"
          docker push "$IMAGE:staging-candidate"

      - name: Capture pushed image identity
        id: image
        run: |
          IMAGE_DIGEST=$(gcloud artifacts docker images describe "$IMAGE:$IMAGE_SHA" \
            --project "$PROJECT" \
            --format='value(image_summary.digest)')
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Artifact Registry did not return a valid digest for $IMAGE:$IMAGE_SHA."
            exit 1
          fi
          {
            echo "image_sha=$IMAGE_SHA"
            echo "image_uri=$IMAGE:$IMAGE_SHA"
            echo "image_digest=$IMAGE_DIGEST"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "Pushed **$IMAGE** from exact source SHA \`$IMAGE_SHA\`."
            echo "Release source identity: \`$IMAGE_SHA\`."
            echo "Release digest input: \`${{ steps.image.outputs.image_digest }}\`."
            echo "Convenience pointer updated: \`staging-candidate\` (never a release input)."
            echo "Registry digest: \`${{ steps.image.outputs.image_digest }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
