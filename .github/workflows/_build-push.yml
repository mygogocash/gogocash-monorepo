# Reusable: build a Docker image from the monorepo and push it to Artifact
# Registry, tagged with the commit SHA + a moving `:staging-candidate` tag.
# Called by build-staging.yml (one invocation per changed app). Deploys NOTHING
# — the release is a separate, human-initiated step (release-staging.yml).
#
# GCP auth is via Workload Identity Federation; the WIF vars come from the
# `staging` GitHub Environment (GCP_PROJECT_ID / GCP_WIF_PROVIDER /
# GCP_SERVICE_ACCOUNT).
name: _build-push (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: Cloud Run service / image name (also the Artifact Registry image)
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile (from the repo root)
        required: true
        type: string
      build_context:
        description: Docker build context path
        required: false
        type: string
        default: "."
      prebuild_command:
        # STATIC string supplied by the trusted caller (build-staging.yml) — not
        # from any event payload — so it is safe to run. Used by app-web to run
        # the Expo web export (with its EXPO_PUBLIC_* baked in) before the image
        # build. Empty for api/admin (their Dockerfiles build from source).
        description: Optional shell command to run before `docker build`
        required: false
        type: string
        default: ""
      region:
        required: false
        type: string
        default: asia-southeast1
      artifact_repo:
        required: false
        type: string
        default: gogocash
    secrets:
      EXPO_PUBLIC_FIREBASE_API_KEY:
        required: false
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:
        required: false
      EXPO_PUBLIC_FIREBASE_PROJECT_ID:
        required: false
      EXPO_PUBLIC_FIREBASE_APP_ID:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    name: build + push ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE: ${{ inputs.region }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ inputs.artifact_repo }}/${{ inputs.service_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: ${{ inputs.prebuild_command != '' }}
        with:
          node-version: "24"
          cache: npm

      - name: Use repository npm version
        if: ${{ inputs.prebuild_command != '' }}
        run: npm install --global npm@10.9.8

      - name: Install (root, workspace-aware)
        if: ${{ inputs.prebuild_command != '' }}
        run: npm ci

      - name: Prebuild
        if: ${{ inputs.prebuild_command != '' }}
        env:
          # Expo Web export (app-web only): bake staging API + backend mode + Firebase
          # client config into the static bundle. Requires repo/environment secrets
          # EXPO_PUBLIC_FIREBASE_* on the `staging` GitHub Environment.
          EXPO_PUBLIC_API_URL: https://api-staging.gogocash.co
          EXPO_PUBLIC_APP_ENV: staging
          EXPO_PUBLIC_ACCOUNT_DATA_SOURCE: backend
          EXPO_PUBLIC_FRONTEND_URL: https://app-staging.gogocash.co
          EXPO_PUBLIC_LIFF_ID: ${{ vars.EXPO_PUBLIC_LIFF_ID }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: ${{ inputs.prebuild_command }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Build image (in-runner; GitHub runners are amd64 = Cloud-Run-compatible)
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            --build-arg NEXT_PUBLIC_API_URL=https://api-staging.gogocash.co \
            --tag "$IMAGE:${{ github.sha }}" \
            --tag "$IMAGE:staging-candidate" \
            --cache-from "$IMAGE:staging-candidate" \
            "${{ inputs.build_context }}"

      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:staging-candidate"

      - name: Summary
        run: |
          echo "Pushed **$IMAGE** as \`${{ github.sha }}\` + \`staging-candidate\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Release it with the **Release (staging)** workflow." >> "$GITHUB_STEP_SUMMARY"
