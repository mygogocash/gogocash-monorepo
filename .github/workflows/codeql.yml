# CodeQL advanced setup — replaces GitHub Default setup so language selection is
# version-controlled. JS/TS (admin, api, mobile web), GitHub Actions, and native
# Expo modules (Kotlin via Android prebuild; Swift via iOS prebuild on macOS).
name: CodeQL

on:
  push:
    branches: [main, dev, staging, production]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"
      - "assets/**"
  pull_request:
    branches: [main, dev, staging, production]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"
      - "assets/**"
  schedule:
    # Weekly — same cadence as GitHub Default setup.
    - cron: "30 1 * * 0"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
            config-file: ./.github/codeql/codeql-config.yml
          - language: actions
            build-mode: none
            config-file: ./.github/codeql/codeql-config.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Wire local mongo sanitizer model pack (JS/TS)
        if: matrix.language == 'javascript-typescript'
        run: |
          echo "CODEQL_ACTION_EXTRA_OPTIONS={\"database\":{\"run-queries\":[\"--additional-packs=${GITHUB_WORKSPACE}/.github/codeql\",\"--extension-packs=mygogocash/gogocash-mongo-sanitizers\"]}}" >> "$GITHUB_ENV"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:${{ matrix.language }}

  analyze-java-kotlin:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./.github/codeql/codeql-native-config.yml

      - name: Build Expo Android project for CodeQL
        run: bash .github/codeql/build-native-android.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:java-kotlin

  analyze-swift:
    name: Analyze (swift)
    # macos-15: React Native 0.86 requires Xcode >= 16.1; the macos-14 image
    # defaults to 15.4 and `pod install` hard-fails ("Please upgrade XCode").
    runs-on: macos-15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select newest Xcode (>= 16.1)
        # RN 0.86 needs Xcode >= 16.1, and the precompile tooling's SwiftPM
        # manifests need Swift tools 6.2 — Xcode 16.4 ships Swift 6.1, which
        # fails package resolution ("package 'apple' is using Swift tools
        # version 6.2.0 but the installed version is 6.1.0", exit 65). Select
        # the NEWEST Xcode on the image instead of pinning a major, and print
        # the inventory unconditionally so future bumps are diagnosable.
        run: |
          ls -d /Applications/Xcode*.app
          XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::No versioned Xcode found on runner image"; exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: swift
          build-mode: manual
          config-file: ./.github/codeql/codeql-native-config.yml

      - name: Build Expo iOS project for CodeQL
        run: bash .github/codeql/build-native-ios.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:swift
