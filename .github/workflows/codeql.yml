# CodeQL advanced setup — replaces GitHub Default setup so language selection is
# version-controlled. JS/TS (admin, api, mobile web) plus GitHub Actions.
# Native Expo modules (Kotlin/Swift) are not scanned: CodeQL no longer supports
# Kotlin without a build, and Swift needs macOS runners (see matrix note).
name: CodeQL

on:
  push:
    branches: [main, dev, staging, production]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"
      - "assets/**"
  pull_request:
    branches: [main, dev, staging, production]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"
      - "assets/**"
  schedule:
    # Weekly — same cadence as GitHub Default setup.
    - cron: "30 1 * * 0"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
            config-file: ./.github/codeql/codeql-config.yml
          - language: actions
            build-mode: none
            config-file: ./.github/codeql/codeql-config.yml
          # java-kotlin: CodeQL 2.25+ refuses Kotlin with build-mode none and the
          # Expo module has no repo-root Gradle project to build; swift analysis
          # requires a macOS runner. Both dropped until a manual-build job exists.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Wire local mongo sanitizer model pack (JS/TS)
        if: matrix.language == 'javascript-typescript'
        run: |
          echo "CODEQL_ACTION_EXTRA_OPTIONS={\"database\":{\"run-queries\":[\"--additional-packs=${GITHUB_WORKSPACE}/.github/codeql\",\"--extension-packs=mygogocash/gogocash-mongo-sanitizers\"]}}" >> "$GITHUB_ENV"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:${{ matrix.language }}
