# CodeQL advanced setup — replaces GitHub Default setup so language selection is
# version-controlled. The repo is JS/TS (admin, api, mobile web) plus one Expo
# local Android module (gototrack-detector) that has no root Gradle project and
# is built only via EAS; scanning java-kotlin with autobuild fails with
# "No build command found". Languages match the prior Default setup config.
name: CodeQL

on:
  push:
    branches: [main, dev, staging, production]
  pull_request:
    branches: [main, dev, staging, production]
  schedule:
    # Weekly — same cadence as GitHub Default setup.
    - cron: "30 1 * * 0"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:${{ matrix.language }}
