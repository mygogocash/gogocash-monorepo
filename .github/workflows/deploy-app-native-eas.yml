# ════════════════════════════════════════════════════════════════════════════
# SCAFFOLD — staging EAS native build / OTA update for the Expo app (apps/app).
# ════════════════════════════════════════════════════════════════════════════
#
# THIS IS A SCAFFOLD UNTIL A POST-PATCH BUILD + OTA + DEVICE PROOF EXISTS. It
# needs the Expo credential the OWNER provides:
#
#   • REQUIRED SECRET (Settings → Secrets and variables → Actions → Secrets):
#       EXPO_TOKEN   — an Expo access token (expo.dev → Account → Access Tokens).
#                      Without it, EAS build/update cannot authenticate.
#
#   • This packet locks the `preview` profile and EAS environment to the
#       `staging` channel and URLs.
#       EXPO_PUBLIC_EAS_PROJECT_ID is inlined so native builds get the OTA URL.
#       EXPO_PUBLIC_FIREBASE_* is NOT in eas.json — eas.json does not expand $VAR.
#       Builds and OTA updates read Firebase from the EAS `preview` environment
#       on expo.dev (see docs/firebase-native-eas.md). GitHub `staging` secrets
#       are the canonical comparison values and are never printed.
#
# Monorepo note: EAS auto-detects the workspace; the working-directory is
# apps/app and `eas build` resolves the root lockfile. No app-source changes here.
#
# TRIGGERS: workflow_dispatch from the actual `staging` branch, or the reusable
# OTA call from ci-staging.yml after its OTA-safety and app gates succeed. A
# manual OTA must prove that same exact OTA-safety job in the selected CI run.
# Before any EAS provider mutation, the workflow proves the exact SHA against
# the exact ci-staging.yml push run and its successful required gates.

name: Deploy App Native (EAS) [scaffold]

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Manual staging action (OTA requires an OTA-safe CI run)"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - update
      platform:
        description: "Target platform (used by build; OTA update targets the staging channel)"
        # Android-first (2026-07-11): default to android so a habitual dispatch
        # doesn't queue an iOS build nobody ships; pick ios/all explicitly.
        required: true
        default: "android"
        type: choice
        options:
          - all
          - android
          - ios
      ci_run_id:
        description: "Optional exact successful CI (staging) push run ID; auto-discovered when blank"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      action:
        description: "Staging packet action"
        required: true
        type: string
      platform:
        description: "Target platform"
        required: true
        type: string
      ci_run_id:
        description: "Exact caller ci-staging.yml run ID"
        required: true
        type: string
    secrets:
      EXPO_TOKEN:
        required: true
      EXPO_PUBLIC_FIREBASE_API_KEY:
        required: false
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:
        required: false
      EXPO_PUBLIC_FIREBASE_PROJECT_ID:
        required: false
      EXPO_PUBLIC_FIREBASE_APP_ID:
        required: false
      EXPO_PUBLIC_NATIVE_OAUTH_PROVIDERS:
        required: false
      EXPO_PUBLIC_POSTHOG_KEY:
        required: false
      EXPO_PUBLIC_POSTHOG_HOST:
        required: false
      EXPO_PUBLIC_SENTRY_DSN:
        required: false

permissions:
  actions: read
  contents: read
  id-token: write

# Literal shared queue for manual build/update and ci-staging reusable calls.
# It is intentionally distinct from ci-staging's caller concurrency group.
concurrency:
  group: gogocash-eas-staging-deployment-queue
  cancel-in-progress: false

jobs:
  eas:
    name: EAS ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      ANDROID_ARTIFACT_EXT: apk
      EAS_CHANNEL: staging
      EAS_ENVIRONMENT: preview
      EAS_PROFILE: preview
      EXPO_PUBLIC_EAS_PROJECT_ID: 0039c25f-f88e-491d-8da9-85b8d6e66558
      EXPO_PUBLIC_API_URL: https://api-staging.gogocash.co
      EXPO_PUBLIC_APP_ENV: staging
      EXPO_PUBLIC_ACCOUNT_DATA_SOURCE: backend
      EXPO_PUBLIC_FRONTEND_URL: https://app-staging.gogocash.co
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 729804769570-jlg4fpajbbvur587dcv9qpocfhn6aots.apps.googleusercontent.com
      NODE_PATH: ${{ github.workspace }}/node_modules:${{ github.workspace }}/apps/app/node_modules
    defaults:
      run:
        working-directory: apps/app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "26"
          cache: npm

      - name: Use repository npm version
        run: npm install --global npm@10.9.8

      - name: Validate staging packet and required Firebase configuration
        env:
          SELECTED_ACTION: ${{ inputs.action }}
          SELECTED_PLATFORM: ${{ inputs.platform }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: node "$GITHUB_WORKSPACE/scripts/deployment/eas-staging-env.mjs"

      - name: Verify EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN secret is required for EAS actions. Add it in repo Settings → Secrets."
            exit 1
          fi

      - name: Set up EAS / Expo
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: "21.0.1"
          token: ${{ secrets.EXPO_TOKEN }}

      # `eas env:exec` loads app.config / config plugins; workspace deps must
      # exist first or Expo fails resolving `expo-build-properties`.
      - name: Install (root, workspace-aware)
        working-directory: .
        run: npm ci

      - name: Verify EAS preview environment
        env:
          EXPECTED_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPECTED_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPECTED_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPECTED_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: |
          expectations_file="$RUNNER_TEMP/eas-preview-expectations.json"
          trap 'rm -f "$expectations_file"' EXIT
          node "$GITHUB_WORKSPACE/scripts/deployment/eas-preview-expectations.mjs" "$expectations_file"

          env \
            -u EXPO_PUBLIC_FIREBASE_API_KEY \
            -u EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN \
            -u EXPO_PUBLIC_FIREBASE_PROJECT_ID \
            -u EXPO_PUBLIC_FIREBASE_APP_ID \
            -u EXPO_PUBLIC_EAS_PROJECT_ID \
            -u EXPO_PUBLIC_API_URL \
            -u EXPO_PUBLIC_APP_ENV \
            -u EXPO_PUBLIC_ACCOUNT_DATA_SOURCE \
            -u EXPO_PUBLIC_FRONTEND_URL \
            -u EXPECTED_FIREBASE_API_KEY \
            -u EXPECTED_FIREBASE_AUTH_DOMAIN \
            -u EXPECTED_FIREBASE_PROJECT_ID \
            -u EXPECTED_FIREBASE_APP_ID \
            eas env:exec "$EAS_ENVIRONMENT" "node \"$GITHUB_WORKSPACE/scripts/deployment/eas-preview-env-proof.mjs\" \"$expectations_file\"" --non-interactive

      # This runs only after the job owns the shared EAS queue. Requiring the
      # exact commit to still be staging HEAD prevents a slower older run from
      # publishing after a newer commit has already reached the queue.
      - name: Require exact CI and current staging head before EAS mutation
        env:
          CURRENT_RUN_ID: ${{ github.run_id }}
          EXPECTED_CI_RUN_ID: ${{ inputs.ci_run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          SELECTED_ACTION: ${{ inputs.action }}
          TARGET_REF: ${{ github.ref }}
          TARGET_SHA: ${{ github.sha }}
        run: node "$GITHUB_WORKSPACE/scripts/deployment/eas-ci-proof.mjs"

      - name: Verify exact staging channel mapping
        if: ${{ inputs.action == 'update' }}
        env:
          EAS_CHANNEL_JSON: ${{ runner.temp }}/eas-channel.json
        run: |
          eas channel:view "$EAS_CHANNEL" \
            --non-interactive \
            --json \
            > "$EAS_CHANNEL_JSON"

          node "$GITHUB_WORKSPACE/scripts/deployment/eas-channel-proof.mjs"

      - name: Verify Expo config
        if: ${{ inputs.action == 'build' }}
        run: |
          node -e "console.log(require.resolve('expo/config-plugins'))"
          npx expo config --json > "$RUNNER_TEMP/expo-config.json"

      # ── build: produces native binaries on EAS (managed credentials) ────────
      - name: EAS Build
        id: eas-build
        if: ${{ inputs.action == 'build' }}
        env:
          EAS_PLATFORM: ${{ inputs.platform }}
        run: |
          eas build \
            --non-interactive \
            --wait \
            --json \
            --platform "$EAS_PLATFORM" \
            --profile "$EAS_PROFILE" \
            > "$RUNNER_TEMP/eas-build.json" || {
              cat "$RUNNER_TEMP/eas-build.json"
              exit 1
            }

      - name: Validate and summarize EAS build result
        if: ${{ inputs.action == 'build' }}
        env:
          COMMIT_SHA: ${{ github.sha }}
          EAS_BUILD_JSON: ${{ runner.temp }}/eas-build.json
          EAS_PLATFORM: ${{ inputs.platform }}
        run: node "$GITHUB_WORKSPACE/scripts/deployment/eas-build-proof.mjs"

      - name: Download Android build artifact
        if: ${{ inputs.action == 'build' && inputs.platform != 'ios' }}
        run: |
          mkdir -p "$RUNNER_TEMP/eas-artifacts"
          curl --fail --location "$EAS_BUILD_ARTIFACT_URL" \
            --output "$RUNNER_TEMP/eas-artifacts/gogocash-preview-android.${ANDROID_ARTIFACT_EXT}"

      - name: Upload Android build artifact
        if: ${{ inputs.action == 'build' && inputs.platform != 'ios' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gogocash-preview-android
          path: ${{ runner.temp }}/eas-artifacts/gogocash-preview-android.${{ env.ANDROID_ARTIFACT_EXT }}
          if-no-files-found: error

      - name: Authenticate to Google Cloud for Android artifact archive
        if: ${{ inputs.action == 'build' && inputs.platform != 'ios' && vars.GCP_EAS_ARTIFACT_BUCKET != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK for Android artifact archive
        if: ${{ inputs.action == 'build' && inputs.platform != 'ios' && vars.GCP_EAS_ARTIFACT_BUCKET != '' }}
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Archive Android build artifact to GCS
        if: ${{ inputs.action == 'build' && inputs.platform != 'ios' && vars.GCP_EAS_ARTIFACT_BUCKET != '' }}
        env:
          APK_PATH: ${{ runner.temp }}/eas-artifacts/gogocash-preview-android.${{ env.ANDROID_ARTIFACT_EXT }}
          GCS_BUCKET: ${{ vars.GCP_EAS_ARTIFACT_BUCKET }}
          GCS_PREFIX: eas/android/preview/${{ github.run_id }}
        run: |
          SHA_PATH="${APK_PATH}.sha256"
          sha256sum "$APK_PATH" | tee "$SHA_PATH"

          gcloud storage cp "$APK_PATH" "gs://${GCS_BUCKET}/${GCS_PREFIX}/gogocash-preview-android.${ANDROID_ARTIFACT_EXT}"
          gcloud storage cp "$SHA_PATH" "gs://${GCS_BUCKET}/${GCS_PREFIX}/gogocash-preview-android.${ANDROID_ARTIFACT_EXT}.sha256"

          {
            echo "### Android artifact archive"
            echo "- Artifact: \`gs://${GCS_BUCKET}/${GCS_PREFIX}/gogocash-preview-android.${ANDROID_ARTIFACT_EXT}\`"
            echo "- SHA-256: \`$(cut -d ' ' -f1 "$SHA_PATH")\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── update: OTA JS/asset update to a channel (no store review) ──────────
      #   Channel and URLs are fixed by the staging packet; the message binds the
      #   provider result to the exact dispatched commit.
      - name: EAS Update (OTA)
        if: ${{ inputs.action == 'update' }}
        env:
          COMMIT_SHA: ${{ github.sha }}
          EAS_UPDATE_JSON: ${{ runner.temp }}/eas-update.json
          EXPO_PUBLIC_NATIVE_OAUTH_PROVIDERS: ${{ secrets.EXPO_PUBLIC_NATIVE_OAUTH_PROVIDERS }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          eas update \
            --non-interactive \
            --json \
            --branch "$EAS_CHANNEL" \
            --environment "$EAS_ENVIRONMENT" \
            --message "ci: $COMMIT_SHA" \
            > "$EAS_UPDATE_JSON"

          node "$GITHUB_WORKSPACE/scripts/deployment/eas-update-proof.mjs"
