# CI signal for merges to staging. NOTE: Railway deploys on push, independently
# of and often BEFORE this workflow finishes — it was observed deploying one
# second after a push whose CI later concluded failure. This workflow does NOT
# gate the deploy; branch protection on the PR is what gates the merge.
#
# Staging CD is Railway-native (gogocash-api, gogocash-admin, @gogocash/mobile).
# GCP build-staging.yml is manual rollback only — it does NOT run on push.
name: CI (staging)

on:
  push:
    branches: [staging]

concurrency:
  group: ci-staging-${{ github.ref }}
  # A run may enter the reusable EAS publisher after CI. Never cancel a run
  # that could already be writing to the provider; the callee also serializes
  # every manual/automatic staging EAS mutation in its own distinct queue.
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: read

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  ota-safety:
    name: OTA-safe runtime payload
    needs: ci
    if: ${{ needs.ci.result == 'success' && needs.ci.outputs.app_ota_payload == 'true' && needs.ci.outputs.app_ota_unsafe != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Record OTA safety proof
        run: |
          echo "OTA safety proof: runtime payload changed and no native-sensitive path changed." >> "$GITHUB_STEP_SUMMARY"

  ota:
    name: publish OTA-safe app update after CI
    needs: [ci, ota-safety]
    if: ${{ needs.ci.result == 'success' && needs.ota-safety.result == 'success' }}
    uses: ./.github/workflows/deploy-app-native-eas.yml
    secrets: inherit
    with:
      action: update
      platform: all
      ci_run_id: ${{ github.run_id }}

  native-build-required:
    name: native build required
    needs: ci
    if: ${{ needs.ci.result == 'success' && needs.ci.outputs.app_ota_unsafe == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Record native compatibility handoff
        run: |
          message="Native-sensitive app files changed. Automatic OTA was blocked; use the staging workflow_dispatch build action after this exact CI run succeeds."
          echo "::warning::$message"
          {
            echo "### Native build required"
            echo
            echo "$message"
          } >> "$GITHUB_STEP_SUMMARY"
