name: gogocash-codeql
# The local sanitizer pack (Mongo query helpers plus the tested GoLink URL
# boundary) is wired in codeql.yml via CODEQL_ACTION_EXTRA_OPTIONS on the
# javascript-typescript job — do not list packs here (init pulls from GHCR).
paths-ignore:
  - '**/node_modules/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  # Native Expo modules scanned separately (java-kotlin / swift matrix jobs).
  - 'apps/app/modules/**/android/**'
  - 'apps/app/modules/**/ios/**'
