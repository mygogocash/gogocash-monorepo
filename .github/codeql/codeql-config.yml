name: gogocash-codeql
# Library pack lives in-repo; resolved via repo-root codeql-workspace.yml (provide).
packs:
  - mygogocash/gogocash-mongo-sanitizers
paths-ignore:
  - '**/node_modules/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  # Native Expo modules scanned separately (java-kotlin / swift matrix jobs).
  - 'apps/app/modules/**/android/**'
  - 'apps/app/modules/**/ios/**'
