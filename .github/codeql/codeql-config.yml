name: gogocash-codeql
# Local mongo sanitizer model pack is wired in codeql.yml via CODEQL_ACTION_EXTRA_OPTIONS
# (--additional-packs + --extension-packs). packs: here only accepts published GHCR packs.
paths-ignore:
  - '**/node_modules/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  # Native Expo modules scanned separately (java-kotlin / swift matrix jobs).
  - 'apps/app/modules/**/android/**'
  - 'apps/app/modules/**/ios/**'
