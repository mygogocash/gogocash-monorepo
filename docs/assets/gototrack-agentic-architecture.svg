<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>GoGoTrack Agentic Architecture</title>

  <rect x="0" y="0" width="1600" height="900" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1600" height="4" fill="#00AA80"/>

  <!-- Header -->
  <text x="60" y="48" fill="#7F7F7F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600">GOGOCASH</text>
  <text x="60" y="88" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">GoGoTrack</text>
  <text x="60" y="118" fill="#005D46" font-family="Arial, Helvetica, sans-serif" font-size="18">Shop normally. Get cashback automatically.</text>

  <!-- Column headers -->
  <rect x="110" y="150" width="250" height="36" rx="8" fill="#E8F4FF" stroke="#2563EB" stroke-width="1"/>
  <text x="235" y="174" fill="#2563EB" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="middle">YOU</text>

  <rect x="420" y="150" width="280" height="36" rx="8" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1"/>
  <text x="560" y="174" fill="#7C3AED" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" text-anchor="middle">AI NOTIFICATION</text>

  <rect x="780" y="150" width="280" height="36" rx="8" fill="#D8F8EF" stroke="#00AA80" stroke-width="1"/>
  <text x="920" y="174" fill="#005D46" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="middle">GOGOCASH</text>

  <rect x="1140" y="150" width="280" height="36" rx="8" fill="#FFF4E8" stroke="#C2410C" stroke-width="1"/>
  <text x="1280" y="174" fill="#C2410C" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="middle">BRAND</text>

  <!-- Lifelines -->
  <line x1="235" y1="186" x2="235" y2="680" stroke="#E4E4E4" stroke-width="2"/>
  <line x1="560" y1="186" x2="560" y2="680" stroke="#E4E4E4" stroke-width="2"/>
  <line x1="920" y1="186" x2="920" y2="680" stroke="#E4E4E4" stroke-width="2"/>
  <line x1="1280" y1="186" x2="1280" y2="680" stroke="#E4E4E4" stroke-width="2"/>

  <!-- Step 1 -->
  <line x1="235" y1="230" x2="560" y2="230" stroke="#3B3B3B" stroke-width="2"/>
  <polygon points="560,230 548,224 548,236" fill="#3B3B3B"/>
  <rect x="285" y="206" width="230" height="26" rx="4" fill="#FFFFFF" stroke="#E4E4E4" stroke-width="1"/>
  <text x="400" y="224" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">1. Shop Shopee</text>

  <!-- Step 2 -->
  <line x1="560" y1="280" x2="920" y2="280" stroke="#3B3B3B" stroke-width="2"/>
  <polygon points="920,280 908,274 908,286" fill="#3B3B3B"/>
  <rect x="645" y="256" width="230" height="26" rx="4" fill="#FFFFFF" stroke="#E4E4E4" stroke-width="1"/>
  <text x="760" y="274" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">2. Find cashback</text>

  <!-- Step 3 -->
  <line x1="920" y1="330" x2="1280" y2="330" stroke="#3B3B3B" stroke-width="2"/>
  <polygon points="1280,330 1268,324 1268,336" fill="#3B3B3B"/>
  <rect x="1005" y="306" width="230" height="26" rx="4" fill="#FFFFFF" stroke="#E4E4E4" stroke-width="1"/>
  <text x="1120" y="324" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">3. Check offer</text>

  <!-- Step 4 -->
  <line x1="1280" y1="380" x2="920" y2="380" stroke="#00AA80" stroke-width="2"/>
  <polygon points="920,380 932,374 932,386" fill="#00AA80"/>
  <rect x="1005" y="356" width="230" height="26" rx="4" fill="#FFFFFF" stroke="#D8F8EF" stroke-width="1"/>
  <text x="1120" y="374" fill="#005D46" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">4. Up to 5% back</text>

  <!-- Step 5 -->
  <line x1="920" y1="430" x2="560" y2="430" stroke="#3B3B3B" stroke-width="2"/>
  <polygon points="560,430 572,424 572,436" fill="#3B3B3B"/>
  <rect x="645" y="406" width="230" height="26" rx="4" fill="#FFFFFF" stroke="#E4E4E4" stroke-width="1"/>
  <text x="760" y="424" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">5. Continue?</text>

  <!-- Step 6 -->
  <line x1="235" y1="480" x2="560" y2="480" stroke="#3B3B3B" stroke-width="2"/>
  <polygon points="560,480 548,474 548,486" fill="#3B3B3B"/>
  <rect x="310" y="456" width="180" height="26" rx="4" fill="#FFFFFF" stroke="#E4E4E4" stroke-width="1"/>
  <text x="400" y="474" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">6. Yes</text>

  <!-- Step 7 -->
  <line x1="560" y1="530" x2="920" y2="530" stroke="#00AA80" stroke-width="2"/>
  <polygon points="920,530 908,524 908,536" fill="#00AA80"/>
  <rect x="635" y="506" width="250" height="26" rx="4" fill="#FFFFFF" stroke="#D8F8EF" stroke-width="1"/>
  <text x="760" y="524" fill="#005D46" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">7. Turn on tracking</text>

  <!-- Step 8 -->
  <line x1="235" y1="580" x2="1280" y2="580" stroke="#C2410C" stroke-width="2" stroke-dasharray="8 4"/>
  <polygon points="1280,580 1268,574 1268,586" fill="#C2410C"/>
  <rect x="625" y="556" width="250" height="26" rx="4" fill="#FFFFFF" stroke="#FFF4E8" stroke-width="1"/>
  <text x="750" y="574" fill="#C2410C" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle">8. Shop on brand</text>

  <!-- Step 9 -->
  <line x1="920" y1="630" x2="235" y2="630" stroke="#00AA80" stroke-width="3"/>
  <polygon points="235,630 247,624 247,636" fill="#00AA80"/>
  <rect x="485" y="606" width="250" height="26" rx="4" fill="#D8F8EF" stroke="#00AA80" stroke-width="1"/>
  <text x="610" y="624" fill="#005D46" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">9. Cashback to wallet</text>

  <!-- Three steps summary -->
  <text x="60" y="710" fill="#7F7F7F" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600">3 STEPS SUMMARY</text>

  <rect x="60" y="725" width="480" height="80" rx="10" fill="#FFFFFF" stroke="#E4E4E4" stroke-width="1"/>
  <circle cx="92" cy="765" r="20" fill="#00AA80" stroke="#FFFFFF" stroke-width="2"/>
  <text x="92" y="772" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">1</text>
  <text x="124" y="752" fill="#00AA80" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">STEP 1 - BROWSE</text>
  <text x="124" y="778" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Which brand?</text>

  <rect x="560" y="725" width="480" height="80" rx="10" fill="#FFFFFF" stroke="#00AA80" stroke-width="2"/>
  <circle cx="592" cy="765" r="20" fill="#00AA80" stroke="#FFFFFF" stroke-width="2"/>
  <text x="592" y="772" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">2</text>
  <text x="624" y="752" fill="#00AA80" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">STEP 2 - ACTIVATE</text>
  <text x="624" y="778" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Turn on tracking</text>

  <rect x="1060" y="725" width="480" height="80" rx="10" fill="#FFFFFF" stroke="#E4E4E4" stroke-width="1"/>
  <circle cx="1092" cy="765" r="20" fill="#00AA80" stroke="#FFFFFF" stroke-width="2"/>
  <text x="1092" y="772" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">3</text>
  <text x="1124" y="752" fill="#00AA80" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">STEP 3 - EARN</text>
  <text x="1124" y="778" fill="#3B3B3B" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Cashback in wallet</text>
</svg>
